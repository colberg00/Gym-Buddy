<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gym Buddy">
  <link rel="manifest" href="manifest.json">
  <title>Gym Buddy</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #252540;
      --border: #3a3a5c;
      --text: #e8e8f0;
      --muted: #8888aa;
      --accent: #60a5fa;
      --danger: #e87272;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: calc(84px + env(safe-area-inset-bottom));
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      padding-top: calc(10px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .header-left { flex: 1; min-width: 0; }

    .header-left h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header-left .date {
      font-size: 13px;
      color: var(--muted);
      margin-top: 1px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      transition: opacity 0.1s;
      white-space: nowrap;
    }
    .btn:active { opacity: 0.65; }
    .btn:disabled { opacity: 0.3; pointer-events: none; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-sm {
      padding: 8px 14px;
      font-size: 14px;
      min-height: 40px;
    }

    .btn-danger-ghost {
      background: transparent;
      color: var(--danger);
      border: 1px solid transparent;
      padding: 8px 12px;
      font-size: 14px;
      min-height: 40px;
    }

    .btn-icon {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .btn-icon:active { background: var(--border); }
    .btn-icon:disabled { opacity: 0.25; pointer-events: none; }

    /* ── Exercise list ───────────────────────────────────────────────────── */
    .exercises {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 52px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; line-height: 1.5; }

    /* ── Exercise card ───────────────────────────────────────────────────── */
    .exercise-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .exercise-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 12px 6px;
    }

    .exercise-name-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 17px;
      font-weight: 600;
      outline: none;
      min-width: 0;
      padding: 4px 0;
    }
    .exercise-name-input::placeholder { color: var(--muted); font-weight: 400; }

    /* ── Sets ────────────────────────────────────────────────────────────── */
    .sets-table {
      padding: 0 12px;
    }

    .set-row {
      display: grid;
      grid-template-columns: 22px 32px 90px 1fr 36px;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      border-top: 1px solid var(--border);
    }
    .set-row.is-done .weight-input,
    .set-row.is-done .reps-slider {
      opacity: 0.35;
      pointer-events: none;
    }
    .set-row.is-done .reps-value {
      opacity: 0.5;
    }

    .set-num {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .weight-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 16px;
      font-weight: 500;
      padding: 8px 10px;
      width: 100%;
      min-height: 42px;
      -moz-appearance: textfield;
    }
    .weight-input::-webkit-outer-spin-button,
    .weight-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .weight-input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }

    .reps-cell {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .reps-value {
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      color: var(--accent);
    }

    .reps-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    .reps-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 0 2px rgba(96,165,250,0.2);
    }
    .reps-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: none;
    }

    /* ── Card footer ─────────────────────────────────────────────────────── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px 12px;
    }

    /* ── App footer ──────────────────────────────────────────────────────── */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      display: flex;
      gap: 10px;
    }
    .footer .btn { flex: 1; }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      top: calc(72px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: #333;
      color: #fff;
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Confirmation sheet ──────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 50;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .modal {
      background: var(--surface);
      border-radius: 16px 16px 0 0;
      padding: 24px 20px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      width: 100%;
      max-width: 500px;
    }
    .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .modal p { color: var(--muted); font-size: 15px; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; }
    .modal-actions .btn { flex: 1; }
    .btn-confirm-danger { background: var(--danger); color: #fff; border: none; }

    /* ── Import sheet ────────────────────────────────────────────────────────── */
    .import-textarea {
      width: 100%;
      min-height: 140px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 16px;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      padding: 10px 12px;
      resize: vertical;
      outline: none;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .import-textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    .import-error {
      color: var(--danger);
      font-size: 13px;
      min-height: 18px;
      margin-bottom: 12px;
    }
    .import-hint {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .btn-confirm-primary { background: var(--accent); color: #fff; border: none; }

    /* ── Done button ─────────────────────────────────────────────────────── */
    .btn-done {
      background: transparent;
      border: 2px solid var(--border);
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      flex-shrink: 0;
      padding: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-done.is-done {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Card navigation ─────────────────────────────────────────────────── */
    .card-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px;
    }
    .card-nav-counter {
      font-size: 14px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width: 48px;
      text-align: center;
    }
    .card-nav .btn {
      min-width: 90px;
    }

    /* ── Landscape lock overlay ──────────────────────────────────────────── */
    .landscape-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text);
    }
    .landscape-overlay .icon { font-size: 48px; }
    .landscape-overlay p {
      font-size: 17px;
      font-weight: 500;
      color: var(--muted);
    }
    @media (orientation: landscape) and (max-height: 500px) {
      .landscape-overlay { display: flex; }
    }
  </style>
</head>
<body>

<div class="landscape-overlay">
  <div class="icon">🔄</div>
  <p>Please rotate your phone to portrait</p>
</div>

<header class="header">
  <div class="header-left">
    <h1>Gym Buddy</h1>
    <div class="date" id="date"></div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="newWorkout()">New</button>
    <button class="btn btn-ghost btn-sm" onclick="openImport()">Import</button>
    <button class="btn btn-primary btn-sm" onclick="addExercise()">+ Exercise</button>
  </div>
</header>

<div class="exercises" id="exercises"></div>

<footer class="footer">
  <button class="btn btn-ghost" onclick="copyToClipboard()">📋 Copy</button>
  <button class="btn btn-primary" onclick="sendToClaude()">Send to Claude</button>
</footer>

<div class="toast" id="toast"></div>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────────

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ── State ─────────────────────────────────────────────────────────────────────

let exercises = [];
let currentIndex = 0;
let pendingAction = null;  // { type: 'deleteExercise'|'newWorkout', id? }

// ── Persistence ───────────────────────────────────────────────────────────────

function save() {
  localStorage.setItem('gymbuddy_session', JSON.stringify(exercises));
  localStorage.setItem('gymbuddy_index', currentIndex);
}

function load() {
  try {
    const raw = localStorage.getItem('gymbuddy_session');
    if (raw) exercises = JSON.parse(raw);
    // Backward compat: default missing done field
    for (const ex of exercises) {
      for (const s of ex.sets) {
        if (s.done === undefined) s.done = false;
      }
    }
  } catch (e) {
    exercises = [];
  }
  currentIndex = parseInt(localStorage.getItem('gymbuddy_index'), 10) || 0;
  currentIndex = Math.max(0, Math.min(currentIndex, exercises.length - 1));
}

// ── Mutations ─────────────────────────────────────────────────────────────────

function addExercise() {
  exercises.push({
    id: uid(),
    name: '',
    sets: [{ id: uid(), weight: '', reps: 8, done: false }]
  });
  currentIndex = exercises.length - 1;
  save();
  render();
  setTimeout(() => {
    const input = document.querySelector('.exercise-name-input');
    if (input) input.focus();
  }, 50);
}

function addSet(exerciseId) {
  const ex = exercises.find(e => e.id === exerciseId);
  if (!ex) return;
  const last = ex.sets[ex.sets.length - 1];
  ex.sets.push({ id: uid(), weight: last ? last.weight : '', reps: last ? last.reps : 8, done: false });
  save();
  render();
}

function deleteSet(exerciseId, setId) {
  const ex = exercises.find(e => e.id === exerciseId);
  if (!ex || ex.sets.length <= 1) return;
  ex.sets = ex.sets.filter(s => s.id !== setId);
  save();
  render();
}

function updateName(exerciseId, value) {
  const ex = exercises.find(e => e.id === exerciseId);
  if (ex) { ex.name = value; save(); }
}

function updateWeight(exerciseId, setId, value) {
  const ex = exercises.find(e => e.id === exerciseId);
  const s = ex && ex.sets.find(s => s.id === setId);
  if (!s || s.done) return;
  s.weight = value; save();
}

function updateReps(exerciseId, setId, value) {
  const ex = exercises.find(e => e.id === exerciseId);
  const s = ex && ex.sets.find(s => s.id === setId);
  if (!s || s.done) return;
  s.reps = parseInt(value, 10);
  save();
  const label = document.getElementById('rv-' + setId);
  if (label) label.textContent = s.reps + ' reps';
}

function toggleDone(exerciseId, setId) {
  const ex = exercises.find(e => e.id === exerciseId);
  const s = ex && ex.sets.find(s => s.id === setId);
  if (s) { s.done = !s.done; save(); render(); }
}

// ── Card navigation ──────────────────────────────────────────────────────────

function prevExercise() {
  if (currentIndex > 0) { currentIndex--; save(); render(); }
}

function nextExercise() {
  if (currentIndex < exercises.length - 1) { currentIndex++; save(); render(); }
}

// ── Reorder exercises ────────────────────────────────────────────────────────

function moveExerciseBefore() {
  if (currentIndex <= 0) return;
  [exercises[currentIndex - 1], exercises[currentIndex]] =
    [exercises[currentIndex], exercises[currentIndex - 1]];
  currentIndex--;
  save();
  render();
}

function moveExerciseAfter() {
  if (currentIndex >= exercises.length - 1) return;
  [exercises[currentIndex], exercises[currentIndex + 1]] =
    [exercises[currentIndex + 1], exercises[currentIndex]];
  currentIndex++;
  save();
  render();
}

// ── Confirm actions ───────────────────────────────────────────────────────────

function deleteExercise(id) {
  const ex = exercises.find(e => e.id === id);
  if (!ex) return;
  pendingAction = { type: 'deleteExercise', id };
  showModal(
    'Delete exercise?',
    escHtml(ex.name || 'Unnamed exercise')
  );
}

function newWorkout() {
  if (exercises.length === 0) return;
  pendingAction = { type: 'newWorkout' };
  showModal('Start new workout?', 'This will clear all current exercises.');
}

function confirmAction() {
  if (!pendingAction) return;
  if (pendingAction.type === 'deleteExercise') {
    exercises = exercises.filter(e => e.id !== pendingAction.id);
    currentIndex = Math.min(currentIndex, Math.max(0, exercises.length - 1));
  } else if (pendingAction.type === 'newWorkout') {
    exercises = [];
    currentIndex = 0;
  }
  pendingAction = null;
  save();
  hideModal();
  render();
}

// ── Import ────────────────────────────────────────────────────────────────────

function tryParseImport(raw) {
  let parsed;
  try {
    parsed = JSON.parse(raw);
  } catch (e) {
    return { success: false, error: 'Invalid JSON — check the format and try again.' };
  }
  if (!parsed || !Array.isArray(parsed.exercises)) {
    return { success: false, error: 'Expected { "exercises": [...] } at the top level.' };
  }
  const imported = [];
  for (const ex of parsed.exercises) {
    if (typeof ex.name !== 'string') {
      return { success: false, error: 'Each exercise must have a "name" string.' };
    }
    if (!Array.isArray(ex.sets) || ex.sets.length === 0) {
      return { success: false, error: `"${ex.name}" must have at least one set.` };
    }
    const sets = [];
    for (const s of ex.sets) {
      const reps = Math.min(16, Math.max(3, parseInt(s.reps, 10) || 8));
      sets.push({ id: uid(), weight: s.weight !== undefined ? String(s.weight) : '', reps, done: false });
    }
    imported.push({ id: uid(), name: ex.name, sets });
  }
  return { success: true, exercises: imported };
}

async function openImport() {
  // Try clipboard-first
  try {
    const text = await navigator.clipboard.readText();
    const trimmed = (text || '').trim();
    if (trimmed) {
      const result = tryParseImport(trimmed);
      if (result.success) {
        exercises = result.exercises;
        currentIndex = 0;
        save();
        render();
        showToast(`Imported ${result.exercises.length} exercise${result.exercises.length !== 1 ? 's' : ''}!`);
        return;
      }
    }
  } catch (e) {
    // Clipboard API denied or unavailable
  }
  // Fall back to manual paste modal
  openImportModal();
}

function openImportModal() {
  removeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>Import from Claude</h3>
      <p class="import-hint">Paste workout JSON below. It will replace your current exercises.</p>
      <textarea
        class="import-textarea"
        id="import-input"
        placeholder='{"exercises":[{"name":"Bench Press","sets":[{"weight":100,"reps":8},{"weight":105,"reps":6}]}]}'
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
      ></textarea>
      <div class="import-error" id="import-error"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="hideModal()">Cancel</button>
        <button class="btn btn-confirm-primary" onclick="confirmImport()">Import</button>
      </div>
    </div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) hideModal(); });
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('import-input').focus(), 50);
}

function confirmImport() {
  const raw = (document.getElementById('import-input').value || '').trim();
  const errEl = document.getElementById('import-error');
  errEl.textContent = '';
  const result = tryParseImport(raw);
  if (!result.success) {
    errEl.textContent = result.error;
    return;
  }
  exercises = result.exercises;
  currentIndex = 0;
  save();
  hideModal();
  render();
  showToast(`Imported ${result.exercises.length} exercise${result.exercises.length !== 1 ? 's' : ''}!`);
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  const container = document.getElementById('exercises');

  if (exercises.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">🏋️</div>
        <p>No exercises yet.<br>Tap <strong>+ Exercise</strong> to get started.</p>
      </div>`;
    return;
  }

  currentIndex = Math.max(0, Math.min(currentIndex, exercises.length - 1));
  const ex = exercises[currentIndex];

  container.innerHTML = `
    <div class="exercise-card">
      <div class="exercise-header">
        <input
          class="exercise-name-input"
          type="text"
          placeholder="Exercise name"
          value="${escHtml(ex.name)}"
          oninput="updateName('${ex.id}', this.value)"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="words"
          spellcheck="false"
        />
        <button class="btn-icon" onclick="moveExerciseBefore()"
          ${currentIndex <= 0 ? 'disabled' : ''} aria-label="Move before">↑</button>
        <button class="btn-icon" onclick="moveExerciseAfter()"
          ${currentIndex >= exercises.length - 1 ? 'disabled' : ''} aria-label="Move after">↓</button>
      </div>
      <div class="sets-table">
        ${ex.sets.map((s, i) => `
          <div class="set-row ${s.done ? 'is-done' : ''}">
            <span class="set-num">${i + 1}</span>
            <button class="btn-done ${s.done ? 'is-done' : ''}"
              onclick="toggleDone('${ex.id}', '${s.id}')"
              aria-label="Mark set done">${s.done ? '✓' : ''}</button>
            <input
              class="weight-input"
              type="number"
              inputmode="decimal"
              placeholder="kg"
              value="${escHtml(String(s.weight))}"
              oninput="updateWeight('${ex.id}', '${s.id}', this.value)"
            />
            <div class="reps-cell">
              <span class="reps-value" id="rv-${s.id}">${s.reps} reps</span>
              <input
                class="reps-slider"
                type="range"
                min="3" max="16"
                value="${s.reps}"
                oninput="updateReps('${ex.id}', '${s.id}', this.value)"
              />
            </div>
            <button
              class="btn-icon"
              onclick="deleteSet('${ex.id}', '${s.id}')"
              ${ex.sets.length <= 1 ? 'disabled' : ''}
              aria-label="Delete set"
            >✕</button>
          </div>
        `).join('')}
      </div>
      <div class="card-footer">
        <button class="btn btn-ghost btn-sm" onclick="addSet('${ex.id}')">+ Set</button>
        <button class="btn btn-danger-ghost btn-sm" onclick="deleteExercise('${ex.id}')">Delete</button>
      </div>
    </div>
    <div class="card-nav">
      <button class="btn btn-ghost btn-sm" onclick="prevExercise()"
        ${currentIndex <= 0 ? 'disabled' : ''}>◀ Prev</button>
      <span class="card-nav-counter">${currentIndex + 1} / ${exercises.length}</span>
      <button class="btn btn-ghost btn-sm" onclick="nextExercise()"
        ${currentIndex >= exercises.length - 1 ? 'disabled' : ''}>Next ▶</button>
    </div>`;
}

// ── Format / Clipboard ────────────────────────────────────────────────────────

function formatWorkout() {
  const date = new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
  const lines = [`Gym Buddy — ${date}`, ''];
  for (const ex of exercises) {
    lines.push(ex.name || '(unnamed)');
    ex.sets.forEach((s, i) => {
      const w = s.weight !== '' ? `${s.weight} kg` : '— kg';
      const check = s.done ? ' ✓' : '';
      lines.push(`  Set ${i + 1}: ${w} × ${s.reps} reps${check}`);
    });
    lines.push('');
  }
  return lines.join('\n').trimEnd();
}

async function copyToClipboard() {
  const text = formatWorkout();
  try {
    await navigator.clipboard.writeText(text);
  } catch (e) {
    // Fallback for older iOS WebView
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  showToast('Copied to clipboard!');
}

async function sendToClaude() {
  await copyToClipboard();
  showToast('Copied — paste into Claude!');
  setTimeout(() => window.open('https://claude.ai/new', '_blank'), 300);
}

// ── Toast ─────────────────────────────────────────────────────────────────────

let toastTimer = null;

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Modal ─────────────────────────────────────────────────────────────────────

function showModal(title, body) {
  removeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>${title}</h3>
      <p>${body}</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="hideModal()">Cancel</button>
        <button class="btn btn-confirm-danger" onclick="confirmAction()">Confirm</button>
      </div>
    </div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) hideModal(); });
  document.body.appendChild(overlay);
}

function hideModal() {
  removeModal();
  pendingAction = null;
}

function removeModal() {
  const el = document.getElementById('modal-overlay');
  if (el) el.remove();
}

// ── PWA icon (generated at runtime for iOS homescreen) ────────────────────────

(function() {
  try {
    const size = 180;
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#60a5fa';
    ctx.font = `bold ${size * 0.4}px -apple-system, system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('GB', size / 2, size / 2);
    const link = document.createElement('link');
    link.rel = 'apple-touch-icon';
    link.href = canvas.toDataURL('image/png');
    document.head.appendChild(link);
  } catch (e) {}
})();

// ── Init ──────────────────────────────────────────────────────────────────────

document.getElementById('date').textContent = new Date().toLocaleDateString('en-US', {
  weekday: 'long', month: 'long', day: 'numeric'
});

load();
render();
</script>
