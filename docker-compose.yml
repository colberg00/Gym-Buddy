services:

  postgres:
    image: postgres:15
    container_name: gym_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gym
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gymdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym -d gymdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-server:
    build: ./mcp-server
    container_name: gym_mcp
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://gym:${POSTGRES_PASSWORD}@postgres:5432/gymdb
      PHILOSOPHY_PATH: /data/philosophy.md
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
      SERVER_URL: ${SERVER_URL}
    volumes:
      - ./philosophy.md:/data/philosophy.md
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
